name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development tools
        run: python -m pip install --requirement requirements-dev.txt
      - name: Run Ruff checks
        run: >-
          python -m ruff check --select E4,E7,E9,F,I,UP,B,SIM,RUF
          scanner.py examples tests
      - name: Check formatting
        run: python -m ruff format --check scanner.py examples tests

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile active Python files
        run: python -m compileall -q scanner.py examples tests
      - name: Run unit and loopback integration tests
        run: python -m unittest discover -s tests -v
      - name: Check dependency-free scanner help
        run: python -I -S scanner.py --help
      - name: Check example help
        run: |
          python examples/sequential_scanner.py --help
          python examples/threaded_queue_scanner.py --help
          python examples/nmap_scanner.py --help
